name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Browser usability tests
        run: npm run test:e2e

      - name: Upload visual review artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: macs-visual-review
          path: |
            test-results/**/*.png
            playwright-report/**
          if-no-files-found: warn
          retention-days: 14
