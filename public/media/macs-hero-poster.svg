<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">MACS Digital Media office poster</title>
  <desc id="desc">A restrained illustrated office scene used when motion is reduced or the background video is unavailable.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#050607"/>
      <stop offset="0.58" stop-color="#10243a"/>
      <stop offset="1" stop-color="#3a6ea5"/>
    </linearGradient>
    <linearGradient id="window" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#dceaf5" stop-opacity="0.86"/>
      <stop offset="1" stop-color="#b4b4b4" stop-opacity="0.22"/>
    </linearGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="26"/>
    </filter>
  </defs>
  <rect width="1280" height="720" fill="url(#background)"/>
  <circle cx="1020" cy="160" r="210" fill="#fe6e60" opacity="0.16" filter="url(#soft)"/>
  <g opacity="0.18" stroke="#f6f6e9">
    <path d="M0 120h1280M0 240h1280M0 360h1280M0 480h1280M0 600h1280"/>
    <path d="M160 0v720M320 0v720M480 0v720M640 0v720M800 0v720M960 0v720M1120 0v720"/>
  </g>
  <rect x="805" y="120" width="330" height="260" rx="8" fill="url(#window)" stroke="#f6f6e9" stroke-opacity="0.24"/>
  <path d="M970 120v260M805 250h330" stroke="#f6f6e9" stroke-opacity="0.28"/>
  <rect x="690" y="490" width="500" height="28" rx="8" fill="#b4b4b4"/>
  <path d="M735 518v132M1140 518v132" stroke="#b4b4b4" stroke-width="22"/>
  <rect x="850" y="330" width="210" height="132" rx="10" fill="#10161d" stroke="#f6f6e9" stroke-opacity="0.42"/>
  <rect x="875" y="355" width="160" height="82" rx="4" fill="#3a6ea5" opacity="0.7"/>
  <path d="M955 462v28M910 490h90" stroke="#b4b4b4" stroke-width="12" stroke-linecap="round"/>
  <circle cx="720" cy="345" r="62" fill="#5d443c"/>
